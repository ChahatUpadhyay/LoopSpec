<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoopSpec v2 — Oxygen Atom Test Harness</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { color: #7fb3ff; margin-bottom: 20px; }
.test { padding: 10px 16px; margin: 4px 0; border-radius: 6px; font-size: 0.9em; }
.pass { background: rgba(0, 200, 80, 0.15); border-left: 4px solid #00c850; }
.fail { background: rgba(255, 60, 60, 0.15); border-left: 4px solid #ff3c3c; }
.pending { background: rgba(255, 200, 0, 0.1); border-left: 4px solid #ffc800; }
.summary { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 1.1em; }
.summary.all-pass { background: rgba(0, 200, 80, 0.2); border: 1px solid #00c850; }
.summary.has-fail { background: rgba(255, 60, 60, 0.2); border: 1px solid #ff3c3c; }
#sim-frame { width: 100%; height: 400px; border: 1px solid #333; border-radius: 8px; margin-bottom: 20px; }
.evidence { font-size: 0.8em; color: #aaa; margin-top: 4px; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>LoopSpec v2 Test Harness — Oxygen Atom Simulation</h1>

<iframe id="sim-frame" src="index.html"></iframe>

<div id="results"></div>
<div id="summary"></div>

<script>
// ============================================================
// AUTOMATED TEST HARNESS
// Tests run against the live simulation via exposed __ATOM_SIM__
// ============================================================

const results = [];
const resultsDiv = document.getElementById('results');
const summaryDiv = document.getElementById('summary');

function log(criterion, testName, passed, evidence) {
  results.push({ criterion, testName, passed, evidence });
  const div = document.createElement('div');
  div.className = `test ${passed ? 'pass' : 'fail'}`;
  div.innerHTML = `<strong>[${criterion}]</strong> ${testName}: <strong>${passed ? 'PASS' : 'FAIL'}</strong>`;
  if (evidence) {
    const ev = document.createElement('div');
    ev.className = 'evidence';
    ev.textContent = evidence;
    div.appendChild(ev);
  }
  resultsDiv.appendChild(div);
}

function showSummary() {
  const passed = results.filter(r => r.passed).length;
  const total = results.length;
  const allPass = passed === total;
  summaryDiv.className = `summary ${allPass ? 'all-pass' : 'has-fail'}`;
  summaryDiv.innerHTML = `<strong>Results: ${passed}/${total} tests passed</strong>` +
    (allPass ? ' — ALL CRITERIA VERIFIED' : ' — SOME CRITERIA FAILED');
  
  // Output JSON for programmatic consumption
  console.log('__TEST_RESULTS__', JSON.stringify({ passed, total, allPass, details: results }));
}

// Wait for iframe to load and Three.js to initialize
const iframe = document.getElementById('sim-frame');
iframe.onload = function() {
  // Give Three.js time to render first frame
  setTimeout(runTests, 2000);
};

function runTests() {
  const win = iframe.contentWindow;
  const sim = win.__ATOM_SIM__;
  const doc = iframe.contentDocument;

  if (!sim) {
    log('SETUP', 'Simulation object accessible', false, '__ATOM_SIM__ is undefined — app did not initialize');
    showSummary();
    return;
  }

  // ==========================================================
  // C1: Nucleus contains 8 protons (red) + 8 neutrons (blue/gray)
  // ==========================================================
  const nucleus = sim.nucleusGroup;
  const nucleusChildren = nucleus.children.length;
  const protons = nucleus.children.filter(c => c.name === 'proton');
  const neutrons = nucleus.children.filter(c => c.name === 'neutron');
  
  const protonColor = protons.length > 0 ? '#' + protons[0].material.color.getHexString() : 'none';
  const neutronColor = neutrons.length > 0 ? '#' + neutrons[0].material.color.getHexString() : 'none';

  log('C1', 'Nucleus total particles === 16',
    nucleusChildren === 16,
    `nucleusGroup.children.length = ${nucleusChildren}`);
  log('C1', 'Proton count === 8 (red)',
    protons.length === 8,
    `protons: ${protons.length}, color: ${protonColor}`);
  log('C1', 'Neutron count === 8 (blue/gray)',
    neutrons.length === 8,
    `neutrons: ${neutrons.length}, color: ${neutronColor}`);

  // ==========================================================
  // C2: Electron configuration 1s²(2) + 2s²(2) + 2p⁴(4) = 8
  // ==========================================================
  const s1Electrons = sim.orbital1sGroup.children.length;
  const s2Electrons = sim.orbital2sGroup.children.length;
  const pLobes = sim.orbital2pGroup.children.length;
  // p-orbitals: 4 electrons represented as 4 filled lobes + 2 empty lobes = 6 total lobes
  // But electron COUNT for 2p = 4 (filled lobes)
  const pFilledLobes = sim.orbital2pGroup.children.filter(c => c.name.includes('filled')).length;

  log('C2', '1s orbital has 2 electron representations',
    s1Electrons === 2,
    `orbital_1s.children.length = ${s1Electrons}`);
  log('C2', '2s orbital has 2 electron representations',
    s2Electrons === 2,
    `orbital_2s.children.length = ${s2Electrons}`);
  log('C2', '2p orbital has 4 filled lobes (4 electrons)',
    pFilledLobes === 4,
    `filled lobes: ${pFilledLobes} (names: ${sim.orbital2pGroup.children.filter(c=>c.name.includes('filled')).map(c=>c.name).join(', ')})`);
  log('C2', 'Total electrons = 8 (2+2+4)',
    s1Electrons + s2Electrons + pFilledLobes === 8,
    `${s1Electrons} + ${s2Electrons} + ${pFilledLobes} = ${s1Electrons + s2Electrons + pFilledLobes}`);

  // ==========================================================
  // C3: s-orbitals are spherical probability clouds with opacity < 1
  // ==========================================================
  const s1Mesh = sim.orbital1sGroup.children[0];
  const s1GeoType = s1Mesh.geometry.type;
  const s1Opacity = s1Mesh.material.opacity;
  const s1Transparent = s1Mesh.material.transparent;

  log('C3', 's-orbital geometry is SphereGeometry',
    s1GeoType === 'SphereGeometry',
    `geometry.type = "${s1GeoType}"`);
  log('C3', 's-orbital material is transparent with opacity < 1',
    s1Transparent && s1Opacity < 1,
    `transparent: ${s1Transparent}, opacity: ${s1Opacity}`);

  // ==========================================================
  // C4: p-orbitals as dumbbell lobes along correct axes
  // ==========================================================
  const pxLobe1 = sim.orbital2pGroup.children.find(c => c.name.includes('px_lobe1'));
  const pyLobe1 = sim.orbital2pGroup.children.find(c => c.name.includes('py_lobe1'));
  const pzLobe1 = sim.orbital2pGroup.children.find(c => c.name.includes('pz_lobe1'));

  // Check ellipsoid scaling (non-uniform = dumbbell)
  const pxScale = pxLobe1 ? `${pxLobe1.scale.x.toFixed(1)},${pxLobe1.scale.y.toFixed(1)},${pxLobe1.scale.z.toFixed(1)}` : 'N/A';
  const isEllipsoid = pxLobe1 && (pxLobe1.scale.x !== pxLobe1.scale.z || pxLobe1.scale.y !== pxLobe1.scale.z);

  log('C4', 'p-orbital lobes have non-uniform scale (dumbbell/ellipsoid)',
    isEllipsoid,
    `px lobe scale: (${pxScale})`);
  
  // Check axis alignment: px along X, py along Y, pz along Z
  const pxOnX = pxLobe1 && Math.abs(pxLobe1.position.x) > Math.abs(pxLobe1.position.y) && Math.abs(pxLobe1.position.x) > Math.abs(pxLobe1.position.z);
  const pyOnY = pyLobe1 && Math.abs(pyLobe1.position.y) > Math.abs(pyLobe1.position.x) && Math.abs(pyLobe1.position.y) > Math.abs(pyLobe1.position.z);
  const pzOnZ = pzLobe1 && Math.abs(pzLobe1.position.z) > Math.abs(pzLobe1.position.x) && Math.abs(pzLobe1.position.z) > Math.abs(pzLobe1.position.y);

  log('C4', 'px lobe positioned along X axis',
    pxOnX,
    `px position: (${pxLobe1 ? pxLobe1.position.x.toFixed(2) : 'N/A'}, ${pxLobe1 ? pxLobe1.position.y.toFixed(2) : 'N/A'}, ${pxLobe1 ? pxLobe1.position.z.toFixed(2) : 'N/A'})`);
  log('C4', 'py lobe positioned along Y axis',
    pyOnY,
    `py position: (${pyLobe1 ? pyLobe1.position.x.toFixed(2) : 'N/A'}, ${pyLobe1 ? pyLobe1.position.y.toFixed(2) : 'N/A'}, ${pyLobe1 ? pyLobe1.position.z.toFixed(2) : 'N/A'})`);
  log('C4', 'pz lobe positioned along Z axis',
    pzOnZ,
    `pz position: (${pzLobe1 ? pzLobe1.position.x.toFixed(2) : 'N/A'}, ${pzLobe1 ? pzLobe1.position.y.toFixed(2) : 'N/A'}, ${pzLobe1 ? pzLobe1.position.z.toFixed(2) : 'N/A'})`);

  // ==========================================================
  // C5: Animation >= 55fps (delta < 18ms)
  // ==========================================================
  const fts = sim.frameTimes;
  const avgDelta = fts.length > 10 ? fts.reduce((a, b) => a + b, 0) / fts.length : 999;
  const fps = fts.length > 10 ? Math.round(1000 / avgDelta) : 0;

  log('C5', 'Average frame delta < 18ms (>=55fps)',
    avgDelta < 18,
    `avg delta: ${avgDelta.toFixed(2)}ms, fps: ~${fps}, samples: ${fts.length}`);

  // ==========================================================
  // C6: OrbitControls with rotate, zoom, pan enabled
  // ==========================================================
  const ctrl = sim.controls;
  log('C6', 'OrbitControls.enableRotate === true',
    ctrl.enableRotate === true,
    `enableRotate: ${ctrl.enableRotate}`);
  log('C6', 'OrbitControls.enableZoom === true',
    ctrl.enableZoom === true,
    `enableZoom: ${ctrl.enableZoom}`);
  log('C6', 'OrbitControls.enablePan === true',
    ctrl.enablePan === true,
    `enablePan: ${ctrl.enablePan}`);

  // ==========================================================
  // C8: No console errors or warnings (checked during load)
  // ==========================================================
  // We check if __ATOM_SIM__ loaded successfully (no fatal errors)
  // and check for any error indicators
  const hasScene = !!sim.scene;
  const hasRenderer = !!sim.renderer;
  const rendererOK = sim.renderer && sim.renderer.domElement && sim.renderer.domElement.tagName === 'CANVAS';

  log('C8', 'Scene initialized without fatal errors',
    hasScene && hasRenderer && rendererOK,
    `scene: ${!!hasScene}, renderer: ${!!hasRenderer}, canvas: ${rendererOK}`);

  // ==========================================================
  // C9: Hund's rule — 4/6 lobes filled
  // ==========================================================
  const allPLobes = sim.orbital2pGroup.children;
  const filledLobes = allPLobes.filter(c => c.name.includes('filled'));
  const emptyLobes = allPLobes.filter(c => c.name.includes('empty'));

  log('C9', '4 filled + 2 empty p-orbital lobes (Hund\'s rule)',
    filledLobes.length === 4 && emptyLobes.length === 2,
    `filled: ${filledLobes.length}, empty: ${emptyLobes.length}, total: ${allPLobes.length}`);
  
  // Verify filled lobes have higher opacity than empty
  const filledOpacity = filledLobes.length > 0 ? filledLobes[0].material.opacity : 0;
  const emptyOpacity = emptyLobes.length > 0 ? emptyLobes[0].material.opacity : 0;
  log('C9', 'Filled lobes visually distinct (higher opacity) from empty',
    filledOpacity > emptyOpacity,
    `filled opacity: ${filledOpacity}, empty opacity: ${emptyOpacity}`);

  // ==========================================================
  // C10: Info panel with atom name, number, config
  // ==========================================================
  const atomName = doc.getElementById('atom-name');
  const atomicNum = doc.getElementById('atomic-number');
  const electronConfig = doc.getElementById('electron-config');

  const nameText = atomName ? atomName.textContent.trim() : '';
  const numText = atomicNum ? atomicNum.textContent.trim() : '';
  const configText = electronConfig ? electronConfig.textContent.trim() : '';

  log('C10', 'Info panel shows "Oxygen"',
    nameText === 'Oxygen',
    `atom-name text: "${nameText}"`);
  log('C10', 'Info panel shows atomic number "8"',
    numText === '8',
    `atomic-number text: "${numText}"`);
  log('C10', 'Info panel shows electron configuration',
    configText.includes('1s') && configText.includes('2s') && configText.includes('2p'),
    `electron-config text: "${configText}"`);

  // ==========================================================
  // SUMMARY
  // ==========================================================
  showSummary();
}
</script>
</body>
</html>
