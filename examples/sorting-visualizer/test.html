<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer — Test Suite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            padding: 2rem;
        }
        h1 { color: #7c3aed; margin-bottom: 1rem; }
        h2 { color: #a78bfa; margin: 1.5rem 0 0.5rem; }
        .test-result {
            padding: 0.5rem 1rem;
            margin: 0.25rem 0;
            border-radius: 6px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .pass { background: rgba(34, 197, 94, 0.15); border-left: 3px solid #22c55e; }
        .fail { background: rgba(239, 68, 68, 0.15); border-left: 3px solid #ef4444; }
        .summary {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .summary.all-pass { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #22c55e; }
        .summary.has-fail { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body>
    <h1>🧪 Sorting Algorithm Test Suite</h1>
    <div id="results"></div>
    <div id="summary"></div>

    <script>
        // ============================================================
        // PURE SORTING ALGORITHMS (no DOM/animation dependencies)
        // These mirror the algorithms in app.js but run synchronously
        // ============================================================

        const SortAlgorithms = {
            bubbleSort(arr) {
                const a = [...arr];
                const n = a.length;
                let comparisons = 0, swaps = 0;
                for (let i = 0; i < n - 1; i++) {
                    for (let j = 0; j < n - i - 1; j++) {
                        comparisons++;
                        if (a[j] > a[j + 1]) {
                            [a[j], a[j + 1]] = [a[j + 1], a[j]];
                            swaps++;
                        }
                    }
                }
                return { sorted: a, comparisons, swaps };
            },

            insertionSort(arr) {
                const a = [...arr];
                const n = a.length;
                let comparisons = 0, swaps = 0;
                for (let i = 1; i < n; i++) {
                    const key = a[i];
                    let j = i - 1;
                    while (j >= 0 && a[j] > key) {
                        comparisons++;
                        a[j + 1] = a[j];
                        swaps++;
                        j--;
                    }
                    if (j >= 0) comparisons++; // final comparison that ended the loop
                    a[j + 1] = key;
                }
                return { sorted: a, comparisons, swaps };
            },

            mergeSort(arr) {
                const a = [...arr];
                let comparisons = 0, swaps = 0;

                const merge = (left, right) => {
                    const result = [];
                    let i = 0, j = 0;
                    while (i < left.length && j < right.length) {
                        comparisons++;
                        if (left[i] <= right[j]) {
                            result.push(left[i++]);
                        } else {
                            result.push(right[j++]);
                            swaps++;
                        }
                    }
                    return result.concat(left.slice(i)).concat(right.slice(j));
                };

                const sort = (arr) => {
                    if (arr.length <= 1) return arr;
                    const mid = Math.floor(arr.length / 2);
                    const left = sort(arr.slice(0, mid));
                    const right = sort(arr.slice(mid));
                    return merge(left, right);
                };

                const sorted = sort(a);
                return { sorted, comparisons, swaps };
            },

            quickSort(arr) {
                const a = [...arr];
                let comparisons = 0, swaps = 0;

                const partition = (low, high) => {
                    const pivot = a[high];
                    let i = low - 1;
                    for (let j = low; j < high; j++) {
                        comparisons++;
                        if (a[j] <= pivot) {
                            i++;
                            [a[i], a[j]] = [a[j], a[i]];
                            swaps++;
                        }
                    }
                    [a[i + 1], a[high]] = [a[high], a[i + 1]];
                    swaps++;
                    return i + 1;
                };

                const sort = (low, high) => {
                    if (low < high) {
                        const pi = partition(low, high);
                        sort(low, pi - 1);
                        sort(pi + 1, high);
                    }
                };

                sort(0, a.length - 1);
                return { sorted: a, comparisons, swaps };
            }
        };

        // ============================================================
        // TEST FRAMEWORK
        // ============================================================

        let totalPassed = 0;
        let totalFailed = 0;
        const resultsDiv = document.getElementById('results');

        const isSorted = (arr) => {
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] > arr[i + 1]) return false;
            }
            return true;
        };

        const arraysEqual = (a, b) => {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        };

        const logResult = (name, passed, detail = '') => {
            const icon = passed ? '✅' : '❌';
            const cls = passed ? 'pass' : 'fail';
            if (passed) totalPassed++; else totalFailed++;
            const div = document.createElement('div');
            div.className = `test-result ${cls}`;
            div.textContent = `${icon} ${name}${detail ? ' — ' + detail : ''}`;
            resultsDiv.appendChild(div);
        };

        const addSection = (title) => {
            const h2 = document.createElement('h2');
            h2.textContent = title;
            resultsDiv.appendChild(h2);
        };

        // ============================================================
        // TEST DATA
        // ============================================================

        const testCases = [
            { name: 'Random array', input: [38, 27, 43, 3, 9, 82, 10] },
            { name: 'Already sorted', input: [1, 2, 3, 4, 5, 6, 7, 8] },
            { name: 'Reverse sorted', input: [8, 7, 6, 5, 4, 3, 2, 1] },
            { name: 'Single element', input: [42] },
            { name: 'Empty array', input: [] },
            { name: 'Duplicates', input: [5, 3, 5, 1, 3, 2, 5, 1] },
            { name: 'All same', input: [7, 7, 7, 7, 7] },
            { name: 'Two elements', input: [2, 1] },
            { name: 'Large random (50)', input: Array.from({ length: 50 }, () => Math.floor(Math.random() * 100) + 1) },
            { name: 'Large random (100)', input: Array.from({ length: 100 }, () => Math.floor(Math.random() * 200) + 1) },
        ];

        // ============================================================
        // RUN TESTS
        // ============================================================

        const algorithms = ['bubbleSort', 'insertionSort', 'mergeSort', 'quickSort'];

        for (const algo of algorithms) {
            addSection(`${algo}`);
            for (const tc of testCases) {
                const expected = [...tc.input].sort((a, b) => a - b);
                try {
                    const result = SortAlgorithms[algo](tc.input);
                    const passed = arraysEqual(result.sorted, expected);
                    logResult(
                        `${algo} — ${tc.name}`,
                        passed,
                        passed
                            ? `${result.comparisons} comparisons, ${result.swaps} swaps`
                            : `Expected [${expected}], got [${result.sorted}]`
                    );
                } catch (err) {
                    logResult(`${algo} — ${tc.name}`, false, `Error: ${err.message}`);
                }
            }
        }

        // ============================================================
        // CROSS-ALGORITHM CONSISTENCY TEST
        // ============================================================

        addSection('Cross-Algorithm Consistency');
        for (const tc of testCases) {
            const results = algorithms.map(algo => SortAlgorithms[algo](tc.input).sorted);
            const allMatch = results.every(r => arraysEqual(r, results[0]));
            logResult(
                `All algorithms agree — ${tc.name}`,
                allMatch,
                allMatch ? 'All produce identical output' : 'MISMATCH between algorithms'
            );
        }

        // ============================================================
        // STABILITY & STATS TESTS
        // ============================================================

        addSection('Statistics Sanity Checks');

        // Bubble sort on reverse sorted should have max comparisons
        const reverseResult = SortAlgorithms.bubbleSort([5, 4, 3, 2, 1]);
        logResult(
            'Bubble sort reverse — comparisons = n*(n-1)/2',
            reverseResult.comparisons === 10,
            `Got ${reverseResult.comparisons}, expected 10`
        );

        // Already sorted should have zero swaps for bubble sort
        const sortedResult = SortAlgorithms.bubbleSort([1, 2, 3, 4, 5]);
        logResult(
            'Bubble sort sorted — zero swaps',
            sortedResult.swaps === 0,
            `Got ${sortedResult.swaps} swaps`
        );

        // ============================================================
        // SUMMARY
        // ============================================================

        const summaryDiv = document.getElementById('summary');
        const total = totalPassed + totalFailed;
        summaryDiv.className = `summary ${totalFailed === 0 ? 'all-pass' : 'has-fail'}`;
        summaryDiv.textContent = totalFailed === 0
            ? `✅ ALL ${total} TESTS PASSED`
            : `❌ ${totalFailed} of ${total} tests FAILED`;
    </script>
</body>
</html>
